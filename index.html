<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FurxTr3v'S Official Site</title>
    <style>
        :root {
            /* Muted, Professional Pride Palette */
            --bg-dark: #0f172a;
            --muted-red: #4a1d1d;
            --muted-orange: #4a371d;
            --muted-yellow: #4a471d;
            --muted-green: #1d4a2d;
            --muted-blue: #1d354a;
            --muted-purple: #2e1d4a;
            
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            background-color: var(--bg-dark);
            overflow: hidden;
        }

        /* Subtle, Slow-Moving Professional Gradient */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, 
                var(--bg-dark), 
                var(--muted-purple), 
                var(--muted-blue), 
                var(--muted-green),
                var(--bg-dark)
            );
            background-size: 400% 400%;
            animation: slowFlow 20s ease infinite;
        }

        @keyframes slowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Sleek Card Design */
        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 48px 32px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(45deg, #6366f1, #a855f7); /* Subtle accent */
            padding: 3px;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 4px;
        }

        .bio {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        /* Minimalist Links */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-link {
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .btn-link:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        footer {
            margin-top: 32px;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="profile-card">
        <img src="https://pbs.twimg.com/profile_images/2042503410042163200/9RaCipry_400x400.jpg" alt="Profile" class="profile-img">
        
        <h1>FurxTr3v</h1>
        <p class="bio">Content Creator, Author & More!</p>

        <div class="links-container">
            <a href="#" target="_blank" class="btn-link">Discord</a>
            <a href="#" target="_blank" class="btn-link">Facebook</a>
            <a href="#" target="_blank" class="btn-link">YouTube</a>
            <a href="#" target="_blank" class="btn-link">Instagram</a>
            <a href="#" target="_blank" class="btn-link">LinkedIn</a>
        </div>

        <footer>
            Est. 2026
        </footer>
    </div>

</body>
</html>
