<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FurxTr3v's Official Site</title>
    <style>
        :root {
            /* Muted, Professional Pride Palette */
            --bg-dark: #0f172a;
            --muted-purple: #2e1d4a;
            --muted-blue: #1d354a;
            --muted-green: #1d4a2d;
            
            --glass-bg: rgba(30, 41, 59, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;

            /* Brand Colors for subtle hover states */
            --discord: #5865F2;
            --youtube: #FF0000;
            --twitter: #1DA1F2;
            --book: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            background-color: var(--bg-dark);
            overflow: hidden;
        }

        /* Subtle Slow-Moving Gradient */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, 
                var(--bg-dark), 
                var(--muted-purple), 
                var(--muted-blue), 
                var(--muted-green),
                var(--bg-dark)
            );
            background-size: 400% 400%;
            animation: slowFlow 20s ease infinite;
        }

        @keyframes slowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Sleek Card Design */
        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, #6366f1, #a855f7);
            padding: 3px;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 6px;
        }

        .bio {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Minimalist Links */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-link {
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.04);
            padding: 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Platform Specific Hover Colors */
        .link-discord:hover { border-color: var(--discord); color: #fff; background: rgba(88, 101, 242, 0.15); }
        .link-twitter:hover { border-color: var(--twitter); color: #fff; background: rgba(29, 161, 242, 0.15); }
        .link-youtube:hover { border-color: var(--youtube); color: #fff; background: rgba(255, 0, 0, 0.15); }
        .link-book:hover { border-color: var(--book); color: #fff; background: rgba(16, 185, 129, 0.15); }

        .btn-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        footer {
            margin-top: 32px;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="profile-card">
        <img src="https://pbs.twimg.com/profile_images/2042503410042163200/9RaCipry_400x400.jpg" alt="FurxTr3v" class="profile-img">
        
        <h1>FurxTr3v</h1>
        <p class="bio">Content Creator, Author of <strong>AETHERFALL</strong> & Community Lead</p>

        <div class="links-container">
            <a href="https://x.com/FurxTr3v" target="_blank" class="btn-link link-twitter">Twitter / X</a>
            <a href="https://www.youtube.com/@FurxTr3v" target="_blank" class="btn-link link-youtube">YouTube</a>
            <a href="https://discord.gg/D8rXEc6Xuc" target="_blank" class="btn-link link-discord">Books Discord Server</a>
            
            <a href="https://tr3vn0x.github.io/AETHERFALL/#acts" target="_blank" class="btn-link link-book">Read AETHERFALL</a>
            <a href="https://tr3vn0x.github.io/book-applications/" target="_blank" class="btn-link link-book">Book Applications</a>
        </div>

        <footer>
            FurxTr3v &bull; Est. 2026
        </footer>
    </div>

</body>
</html>
